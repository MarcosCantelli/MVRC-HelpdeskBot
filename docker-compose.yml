version: '3.8'

services:
  api:
    image: mrhightech/helpdesk-api:latest
    container_name: helpdesk-api
    ports:
      - "5000:5000"
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
    restart: always
    networks:
      - helpdesk-net

  bot:
    image: mrhightech/helpdesk-bot:latest
    container_name: helpdesk-bot
    depends_on:
      - api
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - API_URL=http://helpdesk-api:5000/ticket
    restart: always
    networks:
      - helpdesk-net

networks:
  helpdesk-net:
    driver: bridge