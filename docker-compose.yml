version: '3.8'

services:
  api:
    image: mrhightech/helpdesk-api:latest
    container_name: helpdesk-api
    ports:
      - "5000:5000"
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
    restart: always

  bot:
    image: mrhightech/helpdesk-bot:latest
    container_name: helpdesk-bot
    depends_on:
      - api
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - API_URL=http://helpdesk-api:5000
    restart: always